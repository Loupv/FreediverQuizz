<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#051c2c"/>
      <stop offset="40%" stop-color="#0a3d62"/>
      <stop offset="100%" stop-color="#2d7caa"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a0e8ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle decorative circle -->
  <circle cx="950" cy="180" r="240" fill="#54e1c9" opacity="0.06"/>
  <circle cx="1080" cy="450" r="160" fill="#54e1c9" opacity="0.04"/>

  <!-- Eyebrow -->
  <text x="80" y="195" fill="#54e1c9" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" letter-spacing="6">FREEDIVERQUIZZ</text>

  <!-- Main title -->
  <text x="80" y="305" fill="url(#title)" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="84" font-weight="800" letter-spacing="-1">Révise ton apnée AIDA</text>

  <!-- Subtitle -->
  <text x="80" y="380" fill="#ffffff" opacity="0.8" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="30" font-weight="400">161 questions bilingues · AIDA1 → AIDA4</text>

  <!-- Pills -->
  <g font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="20" font-weight="600">
    <rect x="80" y="460" width="120" height="50" rx="25" fill="rgba(255,255,255,0)" stroke="#54e1c9" stroke-width="1.5" opacity="0.7"/>
    <text x="140" y="491" fill="#54e1c9" text-anchor="middle">AIDA1</text>

    <rect x="220" y="460" width="120" height="50" rx="25" fill="rgba(255,255,255,0)" stroke="#54e1c9" stroke-width="1.5" opacity="0.7"/>
    <text x="280" y="491" fill="#54e1c9" text-anchor="middle">AIDA2</text>

    <rect x="360" y="460" width="120" height="50" rx="25" fill="rgba(255,255,255,0)" stroke="#54e1c9" stroke-width="1.5" opacity="0.7"/>
    <text x="420" y="491" fill="#54e1c9" text-anchor="middle">AIDA3</text>

    <rect x="500" y="460" width="120" height="50" rx="25" fill="rgba(255,255,255,0)" stroke="#54e1c9" stroke-width="1.5" opacity="0.7"/>
    <text x="560" y="491" fill="#54e1c9" text-anchor="middle">AIDA4</text>
  </g>

  <!-- Footer -->
  <text x="80" y="585" fill="#ffffff" opacity="0.5" font-family="-apple-system, 'Segoe UI', Arial, sans-serif" font-size="18">QCM gratuit · bilingue FR/EN · hors-ligne</text>
</svg>
